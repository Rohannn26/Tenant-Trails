services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker-schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"

  api:
    build: .
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
    depends_on:
      - db
    ports:
      - "3000:3000"

volumes:
  dbdata:
